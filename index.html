<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Corazón Galáctico ✦ Nilver T.I</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Cinzel:wght@400;600&display=swap" rel="stylesheet">

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --rose:    #ff4d6d;
      --violet:  #9b30d0;
      --lila:    #cc66ff;
      --gold:    #ffd6e0;
      --glass-bg: rgba(10, 2, 18, 0.55);
      --glass-border: rgba(200, 100, 255, 0.25);
    }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: #000;
    }

    /* ── CAPA 1: Corazón (fondo absoluto) ─────────────────── */
    #heart {
      position: absolute;
      left: 0; top: 0;
      width: 100%; height: 100%;
      z-index: 1;
      background-color: rgba(0, 0, 0, .2);
    }

    /* ── CAPA 2: Galaxia Three.js (overlay, sin bloquear) ─── */
    #galaxy-canvas {
      position: absolute;
      left: 0; top: 0;
      width: 100%; height: 100%;
      z-index: 2;
      pointer-events: none;   /* ← nunca bloquea el corazón */
      opacity: 1;
      transition: opacity 0.8s ease;
    }
    #galaxy-canvas.hidden { opacity: 0; }

    /* ── CAPA 3: UI encima ─────────────────────────────────── */
    #ui-layer {
      position: absolute;
      inset: 0;
      z-index: 10;
      pointer-events: none;
    }

    /* Título superior */
    .title-overlay {
      position: absolute;
      top: 28px;
      left: 50%;
      transform: translateX(-50%);
      text-align: center;
      pointer-events: none;
      white-space: nowrap;
    }
    .title-overlay h1 {
      font-family: 'Cinzel', serif;
      font-size: clamp(1rem, 2.5vw, 1.8rem);
      font-weight: 600;
      letter-spacing: 0.18em;
      background: linear-gradient(135deg, #ff9ab5, #e066ff, #ff4d6d);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      text-shadow: none;
      filter: drop-shadow(0 0 12px rgba(255, 80, 120, 0.5));
      animation: fadeDown 1.2s ease-out both;
    }
    .title-overlay p {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-size: clamp(0.7rem, 1.4vw, 1rem);
      color: rgba(255, 210, 230, 0.7);
      margin-top: 4px;
      letter-spacing: 0.12em;
      animation: fadeDown 1.4s ease-out both;
    }

    @keyframes fadeDown {
      from { opacity: 0; transform: translateY(-20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── Controles flotantes (esquina inferior derecha) ──── */
    .controls-dock {
      position: absolute;
      bottom: 28px;
      right: 28px;
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 10px;
      pointer-events: all;
      animation: fadeUp 1.6s ease-out both;
      z-index: 20;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Panel de música */
    .music-panel {
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      border-radius: 20px;
      padding: 12px 16px;
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 220px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.05);
    }

    /* Botón play/pause */
    .btn-play {
      width: 40px; height: 40px;
      border-radius: 50%;
      border: none;
      background: linear-gradient(135deg, var(--rose), var(--violet));
      color: #fff;
      font-size: 14px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      box-shadow: 0 4px 16px rgba(155, 48, 208, 0.45);
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .btn-play:hover {
      transform: scale(1.08);
      box-shadow: 0 6px 22px rgba(255, 77, 109, 0.5);
    }
    .btn-play:active { transform: scale(0.95); }

    /* Info canción */
    .music-info {
      flex: 1;
      overflow: hidden;
    }
    .music-info .song-label {
      font-family: 'Cinzel', serif;
      font-size: 0.6rem;
      letter-spacing: 0.15em;
      color: var(--lila);
      opacity: 0.8;
      text-transform: uppercase;
      display: block;
      margin-bottom: 2px;
    }
    .music-info .song-name {
      font-family: 'Cormorant Garamond', serif;
      font-size: 0.88rem;
      color: rgba(255,220,240,0.9);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      display: block;
    }

    /* Barra de volumen */
    .volume-wrap {
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .volume-icon {
      font-size: 11px;
      color: rgba(204, 102, 255, 0.7);
      flex-shrink: 0;
    }
    input[type=range].vol-slider ::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 72px; height: 3px;
      background: rgba(255,255,255,0.15);
      border-radius: 2px;
      outline: none;
      cursor: pointer;
    }
    input[type=range].vol-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 11px; height: 11px;
      border-radius: 50%;
      background: var(--lila);
      box-shadow: 0 0 6px rgba(204,102,255,0.6);
    }
    input[type=range].vol-slider::-moz-range-thumb {
      width: 11px; height: 11px;
      border-radius: 50%;
      background: var(--lila);
      border: none;
    }

    /* Botón toggle galaxia */
    .btn-galaxy {
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      border-radius: 50px;
      padding: 7px 16px;
      color: rgba(204, 102, 255, 0.9);
      font-family: 'Cinzel', serif;
      font-size: 0.6rem;
      letter-spacing: 0.15em;
      cursor: pointer;
      transition: background 0.3s, color 0.3s, border-color 0.3s;
      box-shadow: 0 4px 16px rgba(0,0,0,0.3);
    }
    .btn-galaxy:hover {
      background: rgba(155, 48, 208, 0.35);
      border-color: rgba(204, 102, 255, 0.5);
      color: #fff;
    }
    .btn-galaxy.off {
      color: rgba(255,255,255,0.3);
      border-color: rgba(255,255,255,0.08);
    }

    /* Hint de arrastre (Three.js) */
    .drag-hint {
      position: absolute;
      bottom: 28px;
      left: 28px;
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-size: 0.75rem;
      color: rgba(204, 102, 255, 0.5);
      letter-spacing: 0.08em;
      pointer-events: none;
      animation: fadeUp 2s ease-out both;
    }

    /* ── Olas de audio visualizadas (decorativas) ── */
    .equalizer {
      display: flex;
      align-items: flex-end;
      gap: 2px;
      height: 14px;
    }
    .eq-bar {
      width: 3px;
      border-radius: 2px;
      background: var(--lila);
      animation: eqBounce var(--d, 0.8s) ease-in-out infinite alternate;
      height: 4px;
    }
    @keyframes eqBounce {
      to { height: 14px; opacity: 0.6; }
    }
    .eq-bar.paused { animation-play-state: paused; }

    @media (max-width: 600px) {
      .title-overlay h1 { font-size: 1rem; }
      .controls-dock { bottom: 16px; right: 16px; }
      .music-panel { min-width: 180px; padding: 10px 12px; }
      .drag-hint { display: none; }
    }
  </style>
</head>
<body>

  <!-- ░░ CAPA 1 — CORAZÓN (canvas original, sin tocar) ░░ -->
  <canvas id="heart" width="1920" height="947"></canvas>

  <!-- ░░ CAPA 2 — GALAXIA THREE.JS ░░ -->
  <canvas id="galaxy-canvas"></canvas>

  <!-- ░░ CAPA 3 — UI ░░ -->
  <div id="ui-layer">

    <div class="title-overlay">
      <h1>✦ Corazón Galáctico ✦</h1>
      <p>Entre olas y silencios, tu nombre suena a sirena.</p>
    </div>

    <div class="drag-hint">🖱 Arrastra la galaxia · Scroll para zoom</div>

    <div class="controls-dock">

      <!-- Botón toggle galaxia -->
      <button class="btn-galaxy" id="btnGalaxy">🌌 GALAXIA ON</button>

      <!-- Panel música -->
      <div class="music-panel">
        <button class="btn-play" id="btnPlay" title="Reproducir / Pausar">▶</button>

        <div class="music-info">
          <span class="song-label">cali Y El Dandee</span>
          <span class="song-name" id="songName">Tu canción aquí</span>
        </div>

        <div class="volume-wrap">
          <span class="volume-icon">🔊</span>
          <input type="range" class="vol-slider" id="volSlider" min="0" max="1" step="0.02" value="0.6">
        </div>

        <div class="equalizer" id="equalizer">
          <div class="eq-bar paused" style="--d:.6s"></div>
          <div class="eq-bar paused" style="--d:.9s"></div>
          <div class="eq-bar paused" style="--d:.5s"></div>
          <div class="eq-bar paused" style="--d:.7s"></div>
          <div class="eq-bar paused" style="--d:1.1s"></div>
        </div>
      </div>

    </div>
  </div>

  <!-- ░░ AUDIO — cambia "src" por tu canción ░░ -->
  <audio id="music" loop preload="auto">
    <source src="musica/Sirena.mp4" type="audio/mpeg">
    <!-- Puedes agregar más formatos:
    <source src="tu_cancion.ogg" type="audio/ogg">
    -->
  </audio>

  <!-- ════════════════════════════════════════════════════════
       SCRIPT 1: ANIMACIÓN DE CORAZÓN (original, sin cambios)
       ════════════════════════════════════════════════════════ -->
  
  <script>
window.requestAnimationFrame =
window.__requestAnimationFrame ||
window.requestAnimationFrame ||
window.webkitRequestAnimationFrame ||
window.mozRequestAnimationFrame ||
window.oRequestAnimationFrame ||
window.msRequestAnimationFrame ||
(function () {
  return function (callback) {
    return setTimeout(callback, 1000 / 60);
  };
})();

window.esDispositivo = (/android|webos|iphone|ipad|ipod|blackberry|iemobile|opera mini/i.test(
  (navigator.userAgent || navigator.vendor || window.opera).toLowerCase()
));

let cargado = false;

let iniciar = function () {
  if (cargado) return;
  cargado = true;

  const lienzo = document.getElementById('heart');
  const ctx = lienzo.getContext('2d');

  let ancho, alto, dpr;

  function ajustarCanvas() {
    dpr = window.devicePixelRatio || 1;

    ancho = innerWidth;
    alto = innerHeight;

    lienzo.width = ancho * dpr;
    lienzo.height = alto * dpr;

    lienzo.style.width = ancho + "px";
    lienzo.style.height = alto + "px";

    ctx.setTransform(1, 0, 0, 1, 0, 0); // reset
    ctx.scale(dpr, dpr);
  }

  ajustarCanvas();
  window.addEventListener('resize', ajustarCanvas);

  const aleatorio = Math.random;

  ctx.fillStyle = "black";
  ctx.fillRect(0, 0, ancho, alto);

  const posicionCorazon = (rad) => [
    Math.pow(Math.sin(rad), 3),
    -(15 * Math.cos(rad) - 5 * Math.cos(2 * rad) - 2 * Math.cos(3 * rad) - Math.cos(4 * rad))
  ];

  const escalarYTraducir = (pos, sx, sy, dx, dy) => [
    dx + pos[0] * sx,
    dy + pos[1] * sy
  ];

  let cantidadRastro = esDispositivo ? 12 : 50;
  let dr = esDispositivo ? 0.4 : 0.1;

  let puntosOrigen = [];
  for (let i = 0; i < Math.PI * 2; i += dr)
    puntosOrigen.push(escalarYTraducir(posicionCorazon(i), 210, 13, 0, 0));
  for (let i = 0; i < Math.PI * 2; i += dr)
    puntosOrigen.push(escalarYTraducir(posicionCorazon(i), 150, 9, 0, 0));
  for (let i = 0; i < Math.PI * 2; i += dr)
    puntosOrigen.push(escalarYTraducir(posicionCorazon(i), 90, 5, 0, 0));

  let cantidadPuntosCorazon = puntosOrigen.length;
  let puntosObjetivo = [];

  const pulso = (kx, ky) => {
    for (let i = 0; i < puntosOrigen.length; i++) {
      puntosObjetivo[i] = [
        kx * puntosOrigen[i][0] + ancho / 2,
        ky * puntosOrigen[i][1] + alto / 2
      ];
    }
  };

  let e = [];
  for (let i = 0; i < cantidadPuntosCorazon; i++) {
    let x = aleatorio() * ancho;
    let y = aleatorio() * alto;

    e[i] = {
      vx: 0,
      vy: 0,
      R: 2,
      velocidad: aleatorio() + 5,
      q: ~~(aleatorio() * cantidadPuntosCorazon),
      D: 2 * (i % 2) - 1,
      fuerza: 0.2 * aleatorio() + 0.7,
      f: "hsla(330," + ~~(40 * aleatorio() + 60) + "%," + ~~(60 * aleatorio() + 20) + "%,.3)",
      rastro: []
    };

    for (let k = 0; k < cantidadRastro; k++) {
      e[i].rastro[k] = { x, y };
    }
  }

  let tiempo = 0;

  function bucle() {
    let n = -Math.cos(tiempo);
    pulso((1 + n) * 0.5, (1 + n) * 0.5);

    tiempo += ((Math.sin(tiempo) < 0) ? 9 : (n > 0.8) ? 0.2 : 1) * 0.01;

    ctx.fillStyle = "rgba(0,0,0,0.1)";
    ctx.fillRect(0, 0, ancho, alto);

    for (let i = e.length; i--;) {
      let u = e[i];
      let q = puntosObjetivo[u.q];

      let dx = u.rastro[0].x - q[0];
      let dy = u.rastro[0].y - q[1];
      let longitud = Math.sqrt(dx * dx + dy * dy) || 1;

      if (longitud < 10) {
        if (aleatorio() > 0.95) {
          u.q = ~~(aleatorio() * cantidadPuntosCorazon);
        } else {
          if (aleatorio() > 0.99) u.D *= -1;
          u.q = (u.q + u.D + cantidadPuntosCorazon) % cantidadPuntosCorazon;
        }
      }

      u.vx += -dx / longitud * u.velocidad;
      u.vy += -dy / longitud * u.velocidad;

      u.rastro[0].x += u.vx;
      u.rastro[0].y += u.vy;

      u.vx *= u.fuerza;
      u.vy *= u.fuerza;

      for (let k = 0; k < u.rastro.length - 1;) {
        let T = u.rastro[k];
        let N = u.rastro[++k];
        N.x -= 0.4 * (N.x - T.x);
        N.y -= 0.4 * (N.y - T.y);
      }

      ctx.fillStyle = u.f;
      for (let k = 0; k < u.rastro.length; k++) {
        ctx.fillRect(u.rastro[k].x, u.rastro[k].y, 1, 1);
      }
    }

    ctx.fillStyle = "white";
    for (let i = 0; i < puntosObjetivo.length; i++) {
      ctx.fillRect(puntosObjetivo[i][0], puntosObjetivo[i][1], 2, 2);
    }

    requestAnimationFrame(bucle);
  }

  bucle();
};

if (document.readyState !== 'loading') iniciar();
else document.addEventListener('DOMContentLoaded', iniciar);
</script>

  <!-- ════════════════════════════════════════════════════════
       SCRIPT 2: GALAXIA THREE.JS (module, aislado)
       ════════════════════════════════════════════════════════ -->
  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"
    }
  }
  </script>

  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
    import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
    import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
    import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';

    const galaxyCanvas = document.getElementById('galaxy-canvas');

    // ── Escena ──────────────────────────────────────────────
    const scene = new THREE.Scene();
    scene.background = null;   // transparente para que se vea el corazón

    const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 2000);
    camera.position.set(13, 6, 18);
    camera.lookAt(0, 0, 0);

    const renderer = new THREE.WebGLRenderer({ canvas: galaxyCanvas, antialias: true, alpha: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setClearColor(0x000000, 0);  // fondo completamente transparente
    renderer.toneMapping = THREE.ReinhardToneMapping;
    renderer.toneMappingExposure = 1.3;

    // ── Bloom ────────────────────────────────────────────────
    const renderScene = new RenderPass(scene, camera);
    const bloomPass = new UnrealBloomPass(
      new THREE.Vector2(window.innerWidth, window.innerHeight),
      1.1, 0.4, 0.80
    );
    bloomPass.threshold = 0.07;
    bloomPass.strength  = 0.75;
    bloomPass.radius    = 0.6;
    const effectComposer = new EffectComposer(renderer);
    effectComposer.addPass(renderScene);
    effectComposer.addPass(bloomPass);

    // ── Controles (pointer-events activos sobre el canvas galaxia) ──
    //  El canvas tiene pointer-events:none en CSS pero lo habilitamos
    //  en JS solo para OrbitControls, sin que tape la interacción del corazón.
    galaxyCanvas.style.pointerEvents = 'none';
    // Para arrastrar la galaxia, el usuario mantiene Ctrl o usa rueda de scroll.
    // Alternativa: un div invisible z-index 3 captura solo cuando galaxia esté activa.
    const controlsOverlay = document.createElement('div');
    controlsOverlay.id = 'ctrl-overlay';
    Object.assign(controlsOverlay.style, {
      position: 'absolute', inset: '0',
      zIndex: '5', cursor: 'grab',
      display: 'none'   // se activa al mantener el botón derecho o via toggle
    });
    document.body.appendChild(controlsOverlay);

    const controls = new OrbitControls(camera, controlsOverlay);
    controls.enableDamping   = true;
    controls.dampingFactor   = 0.06;
    controls.rotateSpeed     = 1.2;
    controls.zoomSpeed       = 1.0;
    controls.enableZoom      = true;
    controls.autoRotate      = true;
    controls.autoRotateSpeed = 0.5;
    controls.target.set(0, 0.5, 0);

    // ── Mostrar overlay de control con Alt+clic ──────────────
    document.addEventListener('keydown', e => {
      if (e.altKey) {
        controlsOverlay.style.display = 'block';
        controlsOverlay.style.cursor = 'grab';
      }
    });
    document.addEventListener('keyup', () => {
      controlsOverlay.style.display = 'none';
    });

    // ── Texturas de tulipán morado ───────────────────────────
    function createTulipTexture(variant) {
      const canvas = document.createElement('canvas');
      canvas.width = 128; canvas.height = 128;
      const ctx = canvas.getContext('2d');
      ctx.clearRect(0, 0, 128, 128);
      const cx = 64, cy = 68;
      const purples = ['#9b30d0','#b44fe8','#7b2ab5','#c070f0','#6a1fa0'];
      const pCol  = purples[variant % purples.length];
      const pCol2 = ['#d080ff','#e0a0ff','#a040cc','#bf66ee','#8833bb'][variant % 5];

      if (variant === 0) {
        for (let i = 0; i < 6; i++) {
          const angle = (i / 6) * Math.PI * 2;
          const px = cx + Math.cos(angle) * 26, py = cy + Math.sin(angle) * 26;
          const grad = ctx.createRadialGradient(px, py, 2, px, py, 28);
          grad.addColorStop(0, pCol2); grad.addColorStop(1, pCol);
          ctx.beginPath();
          ctx.ellipse(px, py, 18, 28, angle + Math.PI/2, 0, Math.PI*2);
          ctx.fillStyle = grad; ctx.fill();
        }
      } else if (variant === 1) {
        for (let i = 0; i < 3; i++) {
          const angle = (i / 3) * Math.PI * 2;
          ctx.beginPath();
          ctx.ellipse(cx + Math.cos(angle)*20, cy + Math.sin(angle)*20, 14, 30, angle + Math.PI/2, 0, Math.PI*2);
          ctx.fillStyle = pCol2; ctx.fill();
        }
        for (let i = 0; i < 3; i++) {
          const angle = (i / 3) * Math.PI * 2 + Math.PI/3;
          ctx.beginPath();
          ctx.ellipse(cx + Math.cos(angle)*26, cy + Math.sin(angle)*26, 12, 26, angle + Math.PI/2, 0, Math.PI*2);
          ctx.fillStyle = pCol; ctx.fill();
        }
      } else {
        for (let i = 0; i < 10; i++) {
          const angle = (i / 10) * Math.PI * 2;
          ctx.beginPath();
          ctx.ellipse(cx + Math.cos(angle)*28, cy + Math.sin(angle)*28, 11, 20, angle + Math.PI/2, 0, Math.PI*2);
          ctx.fillStyle = i%2===0 ? pCol : pCol2; ctx.fill();
        }
      }

      const cGrad = ctx.createRadialGradient(cx, cy, 2, cx, cy, 13);
      cGrad.addColorStop(0, '#ffe0ff'); cGrad.addColorStop(0.5, '#cc55ee'); cGrad.addColorStop(1, '#6600aa');
      ctx.beginPath(); ctx.arc(cx, cy, 13, 0, Math.PI*2); ctx.fillStyle = cGrad; ctx.fill();
      ctx.fillStyle = '#ffe8ff';
      for (let i = 0; i < 12; i++) {
        const r = Math.random()*10, a = Math.random()*Math.PI*2;
        ctx.beginPath(); ctx.arc(cx+Math.cos(a)*r, cy+Math.sin(a)*r, 1.2, 0, Math.PI*2); ctx.fill();
      }
      const tex = new THREE.CanvasTexture(canvas);
      tex.needsUpdate = true;
      return tex;
    }

    const tulipTextures = [createTulipTexture(0), createTulipTexture(1), createTulipTexture(2)];

    // ── Partículas galaxia ───────────────────────────────────
    const TOTAL_FLOWERS  = 14000;  // reducido para mejor rendimiento
    const positions  = new Float32Array(TOTAL_FLOWERS * 3);
    const colors     = new Float32Array(TOTAL_FLOWERS * 3);
    const sizes      = new Float32Array(TOTAL_FLOWERS);
    const texIndices = new Float32Array(TOTAL_FLOWERS);

    const arms = 4, spiralTightness = 2.6, armSpread = 0.58;
    const innerRadius = 1.0, outerRadius = 16.2;

    for (let i = 0; i < TOTAL_FLOWERS; i++) {
      let radius, angle, yOffset;
      const isCore = Math.random() < 0.2;
      if (isCore) {
        radius  = Math.pow(Math.random(), 1.3) * 3.8;
        angle   = Math.random() * Math.PI * 2;
        yOffset = (Math.random() - 0.5) * 1.9 * (1 - radius / 5);
      } else {
        const armIdx      = Math.floor(Math.random() * arms);
        const armAngleOff = (armIdx / arms) * Math.PI * 2;
        const t           = Math.pow(Math.random(), 1.1);
        radius            = innerRadius + t * (outerRadius - innerRadius);
        const spiralAngle = spiralTightness * Math.log(radius + 0.6) + armAngleOff;
        const randOff     = (Math.random() - 0.5) * armSpread * (1 + radius * 0.08);
        angle   = spiralAngle + randOff;
        yOffset = Math.sin(radius * 1.4 + armIdx) * 0.85 + (Math.random() - 0.5) * 0.8;
        if (Math.random() > 0.7) yOffset += (Math.random() - 0.5) * 0.9;
      }
      positions[i*3]   = Math.cos(angle) * radius;
      positions[i*3+1] = yOffset * 1.3;
      positions[i*3+2] = Math.sin(angle) * radius;

      const dist = Math.min(1, Math.sqrt(
        positions[i*3]**2 + positions[i*3+1]**2 + positions[i*3+2]**2
      ) / 14);
      let r = 0.45 + Math.random()*0.35, g = Math.random()*0.15, b = 0.65 + Math.random()*0.35;
      if (dist < 0.3) { r = 0.6; g = 0.05; b = 0.9; }
      if (dist > 0.7) { r = 0.7; g = 0.2;  b = 1.0; }
      colors[i*3] = r; colors[i*3+1] = g; colors[i*3+2] = b;

      let sizeVal = 0.28 + Math.random()*0.48;
      if (dist < 0.3) sizeVal *= 0.85;
      if (dist > 0.8) sizeVal *= 1.25;
      if (Math.random() > 0.93) sizeVal *= 1.55;
      sizes[i] = sizeVal;
      texIndices[i] = Math.floor(Math.random() * tulipTextures.length);
    }

    const flowerGeometry = new THREE.BufferGeometry();
    flowerGeometry.setAttribute('position',  new THREE.BufferAttribute(positions, 3));
    flowerGeometry.setAttribute('color',     new THREE.BufferAttribute(colors, 3));
    flowerGeometry.setAttribute('size',      new THREE.BufferAttribute(sizes, 1));
    flowerGeometry.setAttribute('texIndex',  new THREE.BufferAttribute(texIndices, 1));

    const vertexShader = `
      attribute float size;
      attribute vec3 color;
      attribute float texIndex;
      varying vec3 vColor;
      varying float vTexIndex;
      void main() {
        vColor = color; vTexIndex = texIndex;
        vec4 mvPosition = modelViewMatrix * vec4(position, 1.0);
        gl_PointSize = size * (300.0 / (-mvPosition.z)) * 0.95;
        gl_PointSize = clamp(gl_PointSize, 7.0, 48.0);
        gl_Position = projectionMatrix * mvPosition;
      }
    `;
    const fragmentShader = `
      uniform sampler2D uTextures[3];
      varying vec3 vColor;
      varying float vTexIndex;
      void main() {
        int idx = int(round(vTexIndex));
        vec4 texColor;
        if (idx == 0)      texColor = texture2D(uTextures[0], gl_PointCoord);
        else if (idx == 1) texColor = texture2D(uTextures[1], gl_PointCoord);
        else               texColor = texture2D(uTextures[2], gl_PointCoord);
        if (texColor.a < 0.2) discard;
        vec3 finalColor = vColor * texColor.rgb;
        finalColor += vec3(0.08, 0.02, 0.18);
        gl_FragColor = vec4(finalColor, texColor.a * 0.9);
      }
    `;

    const flowerMaterial = new THREE.ShaderMaterial({
      uniforms: { uTextures: { value: tulipTextures } },
      vertexShader, fragmentShader,
      transparent: true, depthWrite: false, blending: THREE.AdditiveBlending
    });
    scene.add(new THREE.Points(flowerGeometry, flowerMaterial));

    // ── Tulipanes 3D ─────────────────────────────────────────
    function createTulip3D(x, z, yOff=0, scale=1.0) {
      const group = new THREE.Group();
      const stemMat = new THREE.MeshStandardMaterial({ color: 0x3a8a3a, roughness: 0.6 });
      const stem = new THREE.Mesh(new THREE.CylinderGeometry(0.10*scale, 0.16*scale, 1.2*scale, 6), stemMat);
      stem.position.y = -0.6*scale; group.add(stem);
      const leafMat = new THREE.MeshStandardMaterial({ color: 0x4db04d, side: THREE.DoubleSide });
      [-1, 1].forEach(side => {
        const leaf = new THREE.Mesh(new THREE.ConeGeometry(0.18*scale, 0.6*scale, 5), leafMat);
        leaf.position.set(side*0.28*scale, -0.25*scale, 0); leaf.rotation.z = side*0.55; leaf.rotation.x = 0.15;
        group.add(leaf);
      });
      const petalColors = [0x8822cc,0x9933dd,0x7711bb,0xaa44ee,0x6600aa,0xbb55ff];
      const petalMat = new THREE.MeshStandardMaterial({
        color: petalColors[Math.floor(Math.random()*petalColors.length)],
        emissive: 0x440088, emissiveIntensity: 0.3, roughness: 0.4, side: THREE.DoubleSide
      });
      for (let i = 0; i < 6; i++) {
        const angle = (i/6)*Math.PI*2;
        const petal = new THREE.Mesh(new THREE.CylinderGeometry(0.05*scale, 0.22*scale, 0.7*scale, 5), petalMat);
        petal.position.set(Math.cos(angle)*0.28*scale, 0.22*scale, Math.sin(angle)*0.28*scale);
        petal.rotation.z = angle+Math.PI/2; petal.rotation.x = Math.cos(angle)*0.35;
        group.add(petal);
      }
      const pistilMat = new THREE.MeshStandardMaterial({ color: 0xffccff, emissive: 0xcc66ff, emissiveIntensity: 0.5 });
      const pistil = new THREE.Mesh(new THREE.SphereGeometry(0.10*scale, 8, 8), pistilMat);
      pistil.position.y = 0.55*scale; group.add(pistil);
      group.position.set(x, yOff, z); group.rotation.y = Math.random()*Math.PI*2;
      return group;
    }

    const tulipPositions = [];
    for (let i = 0; i < 8; i++) {
      const angle = (i/8)*Math.PI*2, r = 1.8+Math.random()*1.2;
      tulipPositions.push({ x: Math.cos(angle)*r, z: Math.sin(angle)*r, y: -0.2+Math.random()*0.5, scale: 0.9+Math.random()*0.3 });
    }
    const armAngles = [0, Math.PI/2, Math.PI, 3*Math.PI/2];
    for (let a = 0; a < armAngles.length; a++) {
      for (let r = 3.5; r <= 12; r += 2.2) {
        const base = spiralTightness*Math.log(r+0.8), angle = base+armAngles[a]+(Math.random()-0.5)*0.8;
        const x = Math.cos(angle)*r, z = Math.sin(angle)*r;
        const y = Math.sin(r*1.2)*0.4+(Math.random()-0.5)*0.4;
        tulipPositions.push({ x, z, y: y-0.1, scale: 0.8+Math.random()*0.5 });
      }
    }
    for (let i = 0; i < 10; i++) {
      const rad = 6+Math.random()*7, ang = Math.random()*Math.PI*2;
      tulipPositions.push({ x: Math.cos(ang)*rad, z: Math.sin(ang)*rad, y: (Math.random()-0.5)*1.2, scale: 0.7+Math.random()*0.6 });
    }

    const tulipsGroup = new THREE.Group();
    tulipPositions.forEach(p => tulipsGroup.add(createTulip3D(p.x, p.z, p.y, p.scale)));
    scene.add(tulipsGroup);

    // Polen
    const pollenCount = 1200;
    const pollenPos = new Float32Array(pollenCount*3);
    for (let i = 0; i < pollenCount; i++) {
      const base = tulipPositions[Math.floor(Math.random()*tulipPositions.length)];
      pollenPos[i*3]   = base.x+(Math.random()-0.5)*1.2;
      pollenPos[i*3+1] = base.y+(Math.random()-0.5)*1.0+0.2;
      pollenPos[i*3+2] = base.z+(Math.random()-0.5)*1.2;
    }
    const pollenGeo = new THREE.BufferGeometry();
    pollenGeo.setAttribute('position', new THREE.BufferAttribute(pollenPos, 3));
    scene.add(new THREE.Points(pollenGeo, new THREE.PointsMaterial({ color: 0xcc88ff, size: 0.05, transparent: true, blending: THREE.AdditiveBlending })));

    // Estrellas
    const starCount = 3500;
    const starPos = new Float32Array(starCount*3), starCol = new Float32Array(starCount*3);
    for (let i = 0; i < starCount; i++) {
      const rad = 40+Math.random()*55, theta = Math.random()*Math.PI*2, phi = Math.acos(2*Math.random()-1);
      starPos[i*3]   = rad*Math.sin(phi)*Math.cos(theta);
      starPos[i*3+1] = rad*Math.sin(phi)*Math.sin(theta)*0.5;
      starPos[i*3+2] = rad*Math.cos(phi);
      const k = 0.4+Math.random()*0.8;
      starCol[i*3] = k*(Math.random()>0.5?0.7:0.4); starCol[i*3+1] = k*0.2; starCol[i*3+2] = k*(0.8+Math.random()*0.2);
    }
    const starGeo = new THREE.BufferGeometry();
    starGeo.setAttribute('position', new THREE.BufferAttribute(starPos, 3));
    starGeo.setAttribute('color',    new THREE.BufferAttribute(starCol, 3));
    scene.add(new THREE.Points(starGeo, new THREE.PointsMaterial({ size: 0.16, vertexColors: true, transparent: true, opacity: 0.75, blending: THREE.AdditiveBlending })));

    // Polvo
    const dustCount = 6000, dustPos = new Float32Array(dustCount*3);
    for (let i = 0; i < dustCount; i++) {
      const r = 5+Math.random()*14, ang = Math.random()*Math.PI*2, y = (Math.random()-0.5)*4.5;
      dustPos[i*3] = Math.cos(ang)*r*(0.6+Math.random()*0.7);
      dustPos[i*3+1] = y+(Math.random()-0.5)*1.5;
      dustPos[i*3+2] = Math.sin(ang)*r*(0.6+Math.random()*0.7);
    }
    const dustGeo = new THREE.BufferGeometry();
    dustGeo.setAttribute('position', new THREE.BufferAttribute(dustPos, 3));
    const dustCloud = new THREE.Points(dustGeo, new THREE.PointsMaterial({ color: 0xaa44ff, size: 0.055, transparent: true, opacity: 0.35, blending: THREE.AdditiveBlending }));
    scene.add(dustCloud);

    // Núcleo
    const coreGlow = new THREE.Mesh(
      new THREE.SphereGeometry(1.4, 32, 32),
      new THREE.MeshStandardMaterial({ color: 0xaa00ff, emissive: 0x7700cc, emissiveIntensity: 1.8, roughness: 0.2 })
    );
    scene.add(coreGlow);

    const haloCount = 1200, haloPos = new Float32Array(haloCount*3);
    for (let i = 0; i < haloCount; i++) {
      const r = 1.8+Math.random()*2.2, theta = Math.random()*Math.PI*2, phi = Math.acos(2*Math.random()-1);
      haloPos[i*3] = r*Math.sin(phi)*Math.cos(theta); haloPos[i*3+1] = r*Math.sin(phi)*Math.sin(theta)*0.7; haloPos[i*3+2] = r*Math.cos(phi);
    }
    const haloGeo = new THREE.BufferGeometry();
    haloGeo.setAttribute('position', new THREE.BufferAttribute(haloPos, 3));
    const haloRing = new THREE.Points(haloGeo, new THREE.PointsMaterial({ color: 0xcc66ff, size: 0.09, blending: THREE.AdditiveBlending }));
    scene.add(haloRing);

    // Luces
    scene.add(new THREE.AmbientLight(0x110022));
    const pLight = new THREE.PointLight(0xaa44ff, 1.3, 30);
    pLight.position.set(2, 1.5, 2); scene.add(pLight);
    scene.add(new THREE.PointLight(0x8800cc, 0.8).position.set(-3,2,-5) || new THREE.PointLight(0x8800cc,0.8));
    const bLight = new THREE.PointLight(0x8800cc, 0.8); bLight.position.set(-3,2,-5); scene.add(bLight);
    const fLight = new THREE.PointLight(0xcc88ff, 0.6); fLight.position.set(1,3,3); scene.add(fLight);

    // ── Animación ────────────────────────────────────────────
    let galaxyTime = 0;
    function animateGalaxy() {
      requestAnimationFrame(animateGalaxy);
      galaxyTime += 0.008;
      coreGlow.material.emissiveIntensity = 1.5+Math.sin(galaxyTime*2.5)*0.5;
      pLight.intensity = 1.0+Math.sin(galaxyTime*2.2)*0.3;
      dustCloud.rotation.y = galaxyTime*0.03;
      haloRing.rotation.y  = galaxyTime*0.1;
      haloRing.rotation.x  = Math.sin(galaxyTime*0.2)*0.1;
      tulipsGroup.children.forEach((tulip, idx) => {
        tulip.rotation.z = Math.sin(galaxyTime*1.1+idx)*0.035;
        tulip.rotation.x = Math.cos(galaxyTime*0.9+idx)*0.02;
      });
      controls.update();
      effectComposer.render();
    }
    animateGalaxy();

    // ── Toggle galaxia ───────────────────────────────────────
    const btnGalaxy = document.getElementById('btnGalaxy');
    btnGalaxy.addEventListener('click', () => {
      galaxyCanvas.classList.toggle('hidden');
      const isOn = !galaxyCanvas.classList.contains('hidden');
      btnGalaxy.textContent = isOn ? '🌌 GALAXIA ON' : '🌌 GALAXIA OFF';
      btnGalaxy.classList.toggle('off', !isOn);
    });

    // ── Resize ───────────────────────────────────────────────
    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      effectComposer.setSize(window.innerWidth, window.innerHeight);
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    console.log('🌷 Galaxia de tulipanes · ❤ Corazón animado — unidos');
  </script>

  <!-- ════════════════════════════════════════════════════════
       SCRIPT 3: REPRODUCTOR DE MÚSICA
       ════════════════════════════════════════════════════════ -->
  <script>
  (function () {
    const audio     = document.getElementById('music');
    const btnPlay   = document.getElementById('btnPlay');
    const volSlider = document.getElementById('volSlider');
    const songName  = document.getElementById('songName');
    const eqBars    = document.querySelectorAll('.eq-bar');

    // Detectar nombre de canción desde src
    function updateSongName() {
      const src = audio.currentSrc || (audio.querySelector('source') ? audio.querySelector('source').src : '');
      if (src && src !== window.location.href) {
        const parts = src.split('/');
        const file = parts[parts.length - 1].replace(/\.[^.]+$/, '').replace(/[-_]/g, ' ');
        if (file && file.toLowerCase() !== 'aqui_tu_cancion') songName.textContent = file;
      }
    }

    audio.volume = parseFloat(volSlider.value);

    function setPlaying(playing) {
      btnPlay.textContent = playing ? '⏸' : '▶';
      eqBars.forEach(b => b.classList.toggle('paused', !playing));
    }

    btnPlay.addEventListener('click', () => {
      if (audio.paused) {
        audio.play().catch(() => {});
        setPlaying(true);
      } else {
        audio.pause();
        setPlaying(false);
      }
    });

    volSlider.addEventListener('input', () => {
      audio.volume = parseFloat(volSlider.value);
    });

    audio.addEventListener('play',  () => setPlaying(true));
    audio.addEventListener('pause', () => setPlaying(false));
    audio.addEventListener('canplay', updateSongName);

    // Intentar autoplay (puede ser bloqueado por el navegador)
    const tryAutoplay = () => {
      audio.play()
        .then(() => setPlaying(true))
        .catch(() => { /* silencioso — usuario debe hacer clic */ });
    };
    if (document.readyState === 'complete') tryAutoplay();
    else window.addEventListener('load', tryAutoplay);
  })();
  </script>
